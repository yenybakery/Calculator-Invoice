<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kalkulator Gorden & Blinds Pro</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: #e0e0e0; --accent: #bb86fc; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; display: flex; flex-wrap: wrap; gap: 20px; }
        .panel { background: var(--panel); padding: 20px; border-radius: 12px; flex: 1; min-width: 350px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; background: #333; color: white; border: 1px solid #444; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .switch-wrapper { position: relative; width: 100%; height: 50px; background: #2a2a2a; border-radius: 25px; display: flex; align-items: center; cursor: pointer; margin-bottom: 15px; }
        .switch-toggle { position: absolute; left: 5px; width: 48%; height: 40px; background: var(--accent); border-radius: 20px; transition: 0.3s; }
        .mode-blinds .switch-toggle { transform: translateX(100%); }
        .window-card { border: 1px solid #444; padding: 15px; margin-bottom: 10px; border-radius: 8px; background: #252525; }

        /* --- STYLING CUSTOM MODAL (TAMPIL PENUH TANPA SCROLL) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: var(--panel);
            border: 2px solid var(--accent);
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: scale(0.85);
            transition: transform 0.25s ease;
            margin: auto;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-header {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--accent);
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .modal-body {
            text-align: left;
            font-size: 0.95rem;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2d2d2d;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .modal-footer {
            margin-top: 20px;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('Service Worker Registered'));
      }
    </script>
</head>
<body>

<div class="panel">
    <h2>Input Data</h2>
    <div class="switch-wrapper" onclick="toggleMode()" id="switchBox">
        <div class="switch-toggle"></div>
        <div style="flex:1; text-align:center; font-weight:bold; z-index:1; color: #fff;">CURTAIN</div>
        <div style="flex:1; text-align:center; font-weight:bold; z-index:1; color: #fff;">BLINDS</div>
    </div>

    <input type="text" id="nama" placeholder="Nama Jendela">

    <div id="curtainFields">
        <div class="grid-2">
            <input type="number" id="lebar" placeholder="Lebar (m)">
            <input type="number" id="tinggi" placeholder="Tinggi (m)">
            <input type="number" id="hKain" placeholder="Harga Kain Utama/m">
            <input type="number" id="hVitras" placeholder="Harga Vitrase/m">
        </div>
        <select id="model" onchange="checkModel()">
            <option value="smokring">Smokring</option>
            <option value="plisket">Plisket</option>
            <option value="tabtop">Tab Top</option>
            <option value="spiral">Spiral</option>
        </select>
        <select id="jenisKain">
            <option value="import">Import</option>
            <option value="lokal">Lokal</option>
            <option value="vitrase">Kain Vitrase</option>
        </select>
        
        <div style="display:flex; align-items:center; gap:10px; margin:10px 0;">
            <label>Vitrase Tambahan:</label>
            <button id="btnVitrase" onclick="toggleVitrase()" style="width:100px;">OFF</button>
        </div>
        <div id="vContainer" class="hidden">
            <select id="vModel" onchange="updateVitraseUI()">
                <option value="plisket">Vitrase Plisket</option>
                <option value="spiral">Vitrase Spiral</option>
            </select>
            <div id="vInputSpiral" class="grid-2 hidden">
                <input type="number" id="vL" placeholder="L (m)"><input type="number" id="vT" placeholder="T (m)"><input type="number" id="vQ" placeholder="Qty">
            </div>
        </div>
    </div>

    <div id="blindsFields" class="hidden">
        <div class="grid-2">
            <input type="number" id="bL" placeholder="Lebar (m)">
            <input type="number" id="bT" placeholder="Tinggi (m)">
            <input type="number" id="bHarga" placeholder="Harga/m²">
        </div>
    </div>
    <button onclick="tambah()">TAMBAH JENDELA</button>
</div>

<div class="panel">
    <h2>Daftar Jendela</h2>
    <div id="daftarJendela"></div>
    <h3 id="totalSemua">Total: Rp 0</h3>
</div>

<!-- CONTAINER CUSTOM MODAL -->
<div id="customModal" class="modal-overlay" onclick="tutupModalLuar(event)">
    <div class="modal-content">
        <div id="modalTitle" class="modal-header">Rincian Perhitungan</div>
        <div id="modalBody" class="modal-body">
            <!-- Data rincian dinamis akan dirender di sini -->
        </div>
        <div class="modal-footer">
            <button onclick="tutupModal()">TUTUP</button>
        </div>
    </div>
</div>

<script>
let list = []; let mode = 'curtain'; let vOn = false;
const h = { jahit: 20000, smokring: 4500, rollet: 65000, rell: 50000, hook: 40000, tali: 50000, stick: 50000, instalasi: 50000 };

function checkModel() {
    const model = document.getElementById('model').value;
    const btnV = document.getElementById('btnVitrase');
    if(model === 'spiral') {
        document.getElementById('jenisKain').value = 'vitrase';
        vOn = false; btnV.innerText = "OFF"; btnV.disabled = true;
        document.getElementById('vContainer').classList.add('hidden');
    } else {
        btnV.disabled = false;
    }
}

function toggleMode() {
    mode = (mode === 'curtain') ? 'blinds' : 'curtain';
    document.getElementById('switchBox').classList.toggle('mode-blinds');
    document.getElementById('curtainFields').classList.toggle('hidden');
    document.getElementById('blindsFields').classList.toggle('hidden');
}

function toggleVitrase() {
    if(document.getElementById('model').value === 'spiral') return;
    vOn = !vOn;
    document.getElementById('btnVitrase').innerText = vOn ? "ON" : "OFF";
    document.getElementById('vContainer').classList.toggle('hidden', !vOn);
    updateVitraseUI();
}

function updateVitraseUI() {
    const isSpiral = document.getElementById('vModel').value === 'spiral';
    document.getElementById('vInputSpiral').classList.toggle('hidden', !(vOn && isSpiral));
}

function tambah() {
    let obj = { id: Date.now(), mode, nama: document.getElementById('nama').value || (mode === 'curtain' ? "Gorden" : "Blinds") };
    if(mode === 'curtain') {
        Object.assign(obj, { L: +document.getElementById('lebar').value, T: +document.getElementById('tinggi').value, hKain: +document.getElementById('hKain').value, hVit: +document.getElementById('hVitras').value, model: document.getElementById('model').value, jenis: document.getElementById('jenisKain').value, vOn, vModel: document.getElementById('vModel').value, vL: +document.getElementById('vL').value, vT: +document.getElementById('vT').value, vQ: +document.getElementById('vQ').value });
    } else {
        Object.assign(obj, { h: +document.getElementById('bHarga').value, L: +document.getElementById('bL').value, T: +document.getElementById('bT').value });
    }
    list.push(obj); render();
}

function hitung(w) {
    let items = [], Lc = Math.max(w.L, 1);
    if(w.mode === 'curtain') {
        // Pemisahan rumus kain dasar agar hitungan kain utama dan vitrase tidak saling tercampur
        let rumusDasarKain = (w.jenis === 'lokal') ? Math.ceil((w.L + 0.2) / 0.4) * (w.T + 0.3) : (w.L + 0.2) * 3;
        
        let mK = rumusDasarKain;
        if(w.model === 'tabtop') mK += 1.0;
        
        let hargaKain = (w.jenis === 'vitrase') ? w.hVit : w.hKain;
        items.push({nama: "Kain", qty: mK.toFixed(2)+"m", harga: mK * hargaKain}, {nama: "Jahit Kain", qty: mK.toFixed(2)+"m", harga: mK * h.jahit});
        
        if(w.model === 'smokring') {
            let n = Math.ceil(w.L * 24); if(n%2!==0) n++;
            items.push({nama: "Smokring", qty: n+"pcs", harga: n * h.smokring});
        }
        if(['smokring', 'tabtop', 'plisket'].includes(w.model)) {
            items.push({nama: (w.model === 'plisket' ? "Rell" : "Rollet"), qty: Lc+"m", harga: Lc * (w.model === 'plisket' ? h.rell : h.rollet)}, {nama: "Hook", qty: "1 set", harga: h.hook}, {nama: "Tali", qty: "1 set", harga: h.tali});
        } else if(w.model === 'spiral') { items.push({nama: "Stick", qty: "1pcs", harga: h.stick}); }
        
        if(w.vOn) {
            // Vitrase spiral menggunakan input khususnya, vitrase non-spiral kembali ke rumus dasar murni tanpa bonus +1.0m Tab Top
            let mKvit = (w.vModel === 'spiral') ? (w.vL * w.vQ) : rumusDasarKain;
            items.push({nama: "Vitrase", qty: mKvit.toFixed(2)+"m", harga: mKvit * w.hVit}, {nama: "Jahit Vitrase", qty: mKvit.toFixed(2)+"m", harga: mKvit * h.jahit}, {nama: "Rell", qty: Lc+"m", harga: Lc * h.rell});
        }
        items.push({nama: "Instalasi", qty: Lc+"m", harga: Lc * h.instalasi});
    } else {
        let luas = Math.max(w.L, 1) * Math.max(w.T, 1);
        items.push({nama: "Blinds", qty: luas+"m²", harga: luas * w.h}, {nama: "Instalasi", qty: Lc+"m", harga: Lc * h.instalasi});
    }
    return { items, total: items.reduce((s, i) => s + i.harga, 0) };
}

function render() {
    let cont = document.getElementById('daftarJendela'), grand = 0;
    cont.innerHTML = list.map(w => {
        let res = hitung(w); grand += res.total;
        
        let secureData = encodeURIComponent(JSON.stringify({ nama: w.nama, items: res.items, total: res.total }));

        return `<div class="window-card">
            <strong>${w.nama}</strong>: Rp ${res.total.toLocaleString()} 
            <button onclick="bukaModal('${secureData}')">Detail</button>
            <button onclick="list=list.filter(x=>x.id!=${w.id});render()">Hapus</button>
        </div>`;
    }).join('');
    document.getElementById('totalSemua').innerText = "Total Semua: Rp " + grand.toLocaleString();
}

// --- FUNGSI CUSTOM MODAL ---
function bukaModal(encodedData) {
    const data = JSON.parse(decodeURIComponent(encodedData));
    
    document.getElementById('modalTitle').innerText = "Rincian: " + data.nama;
    
    let bodyHtml = '';
    data.items.forEach(item => {
        bodyHtml += `
            <div class="detail-row">
                <div>
                    <div style="font-weight: bold;">${item.nama}</div>
                    <div style="font-size: 0.8rem; color: #aaa;">Qty: ${item.qty}</div>
                </div>
                <div style="font-weight: bold; color: var(--accent);">
                    Rp ${Math.round(item.harga).toLocaleString()}
                </div>
            </div>
        `;
    });
    
    bodyHtml += `
        <div class="detail-row" style="border-top: 2px solid var(--accent); margin-top: 10px; padding-top: 12px; font-size: 1.1rem;">
            <strong>TOTAL AKHIR</strong>
            <strong style="color: #4af2a1;">Rp ${Math.round(data.total).toLocaleString()}</strong>
        </div>
    `;
    
    document.getElementById('modalBody').innerHTML = bodyHtml;
    document.getElementById('customModal').classList.add('active');
}

function tutupModal() {
    document.getElementById('customModal').classList.remove('active');
}

function tutupModalLuar(event) {
    if (event.target.id === 'customModal') {
        tutupModal();
    }
}
</script>

<button onclick="lanjutKeInvoice()" style="background:#28a745; width:100%; padding:15px; margin-top:20px; font-size:18px; cursor:pointer;">LANJUT KE INVOICE</button>

<script>
function lanjutKeInvoice() {
    const totalSemua = document.getElementById('totalSemua').innerText.replace('Total Semua: Rp ', '').replace(/,/g, '');
    localStorage.setItem('listJendela', JSON.stringify(list));
    localStorage.setItem('totalSemua', totalSemua);
    window.location.href = 'invoice.html';
}
</script>

</body>
</html>
