<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta Viewport penting untuk responsif di HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Gorden & Blinds Pro</title>
    
    <style>
        :root { 
            --bg: #121212; 
            --panel: #1e1e1e; 
            --text: #e0e0e0; 
            --accent: #bb86fc;
            --danger: #cf6679;
            --success: #28a745;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 12px; 
            display: flex; 
            flex-direction: column;
            gap: 16px; 
            max-width: 600px; /* Batas lebar agar tetap rapi di tablet/desktop */
            margin: 0 auto;
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 12px;
            color: var(--accent);
        }

        .panel { 
            background: var(--panel); 
            padding: 16px; 
            border-radius: 12px; 
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .grid-2 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }

        /* Ukuran input & button disesuaikan untuk jari (Touch Target 44px+) */
        input, select, button { 
            width: 100%; 
            height: 46px;
            padding: 10px 12px; 
            margin: 5px 0; 
            background: #2a2a2a; 
            color: white; 
            border: 1px solid #444; 
            border-radius: 8px; 
            font-size: 16px; /* Minimal 16px agar Safari iOS tidak auto-zoom saat diketik */
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        button { 
            background: var(--accent); 
            color: #000; 
            font-weight: bold; 
            border: none;
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease, opacity 0.1s ease;
        }

        /* Efek saat tombol ditekan di HP */
        button:active {
            transform: scale(0.97);
            opacity: 0.85;
        }

        .hidden { display: none !important; }

        /* Switch Mode Toggle */
        .switch-wrapper { 
            position: relative; 
            width: 100%; 
            height: 48px; 
            background: #2a2a2a; 
            border-radius: 24px; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            margin-bottom: 15px; 
            padding: 4px;
            border: 1px solid #444;
        }
        .switch-toggle { 
            position: absolute; 
            left: 4px; 
            width: calc(50% - 4px); 
            height: 40px; 
            background: var(--accent); 
            border-radius: 20px; 
            transition: 0.3s ease; 
        }
        .mode-blinds .switch-toggle { 
            transform: translateX(100%); 
        }

        /* Card Jendela */
        .window-card { 
            border: 1px solid #333; 
            padding: 14px; 
            margin-bottom: 10px; 
            border-radius: 10px; 
            background: #252525; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
        }
        .card-actions {
            display: flex;
            gap: 8px;
        }
        .card-actions button {
            height: 38px;
            font-size: 14px;
            margin: 0;
        }

        /* Custom Modal Responsive */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 16px;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: var(--panel);
            border: 1px solid var(--accent);
            border-radius: 14px;
            width: 100%;
            max-width: 420px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: transform 0.25s ease;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-header {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent);
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2d2d2d;
        }

        .btn-main {
            background: var(--success); 
            color: #fff;
            height: 52px;
            font-size: 16px;
            margin-top: 10px;
            border-radius: 10px;
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('Service Worker Registered'));
      }
    </script>
</head>
<body>

<div class="panel">
    <h2>Input Data</h2>
    <div class="switch-wrapper" onclick="toggleMode()" id="switchBox">
        <div class="switch-toggle"></div>
        <div style="flex:1; text-align:center; font-weight:bold; z-index:1; color: #fff;">CURTAIN</div>
        <div style="flex:1; text-align:center; font-weight:bold; z-index:1; color: #fff;">BLINDS</div>
    </div>

    <input type="text" id="nama" placeholder="Nama Jendela (misal: Ruang Tamu)">

    <div id="curtainFields">
        <div class="grid-2">
            <input type="number" id="lebar" placeholder="Lebar (m)" inputmode="decimal">
            <input type="number" id="tinggi" placeholder="Tinggi (m)" inputmode="decimal">
            <input type="number" id="hKain" placeholder="Harga Kain/m" inputmode="numeric">
            <input type="number" id="hVitras" placeholder="Harga Vitrase/m" inputmode="numeric">
        </div>
        <select id="model" onchange="checkModel()">
            <option value="smokring">Model: Smokring</option>
            <option value="plisket">Model: Plisket</option>
            <option value="tabtop">Model: Tab Top</option>
            <option value="spiral">Model: Spiral</option>
        </select>
        <select id="jenisKain">
            <option value="import">Jenis: Import</option>
            <option value="lokal">Jenis: Lokal</option>
            <option value="vitrase">Kain Vitrase</option>
        </select>
        
        <div style="display:flex; align-items:center; justify-content:space-between; margin:12px 0;">
            <label style="font-size: 14px;">Vitrase Tambahan:</label>
            <button id="btnVitrase" onclick="toggleVitrase()" style="width:80px; height:38px; margin:0;">OFF</button>
        </div>
        
        <div id="vContainer" class="hidden">
            <select id="vModel" onchange="updateVitraseUI()">
                <option value="plisket">Vitrase Plisket</option>
                <option value="spiral">Vitrase Spiral</option>
            </select>
            <div id="vInputSpiral" class="grid-2 hidden">
                <input type="number" id="vL" placeholder="L (m)" inputmode="decimal">
                <input type="number" id="vT" placeholder="T (m)" inputmode="decimal">
                <input type="number" id="vQ" placeholder="Qty" inputmode="numeric">
            </div>
        </div>
    </div>

    <div id="blindsFields" class="hidden">
        <div class="grid-2">
            <input type="number" id="bL" placeholder="Lebar (m)" inputmode="decimal">
            <input type="number" id="bT" placeholder="Tinggi (m)" inputmode="decimal">
        </div>
        <input type="number" id="bHarga" placeholder="Harga / m²" inputmode="numeric">
    </div>

    <button onclick="tambah()" style="margin-top: 10px;">+ TAMBAH JENDELA</button>
</div>

<div class="panel">
    <h2>Daftar Jendela</h2>
    <div id="daftarJendela"></div>
    <h3 id="totalSemua" style="margin-top:15px; font-size:1.1rem; text-align:right; color:var(--accent);">Total: Rp 0</h3>
</div>

<button class="btn-main" onclick="lanjutKeInvoice()">LANJUT KE INVOICE</button>

<!-- CONTAINER CUSTOM MODAL -->
<div id="customModal" class="modal-overlay" onclick="tutupModalLuar(event)">
    <div class="modal-content">
        <div id="modalTitle" class="modal-header">Rincian Perhitungan</div>
        <div id="modalBody">
            <!-- Data rincian dinamis -->
        </div>
        <div style="margin-top: 20px;">
            <button onclick="tutupModal()" style="background:#444; color:#fff;">TUTUP</button>
        </div>
    </div>
</div>

<script>
let list = []; let mode = 'curtain'; let vOn = false;
const h = { jahit: 20000, smokring: 4500, rollet: 65000, rell: 50000, hook: 40000, tali: 50000, stick: 50000, instalasi: 50000 };

function checkModel() {
    const model = document.getElementById('model').value;
    const btnV = document.getElementById('btnVitrase');
    if(model === 'spiral') {
        document.getElementById('jenisKain').value = 'vitrase';
        vOn = false; btnV.innerText = "OFF"; btnV.disabled = true;
        document.getElementById('vContainer').classList.add('hidden');
    } else {
        btnV.disabled = false;
    }
}

function toggleMode() {
    mode = (mode === 'curtain') ? 'blinds' : 'curtain';
    document.getElementById('switchBox').classList.toggle('mode-blinds');
    document.getElementById('curtainFields').classList.toggle('hidden');
    document.getElementById('blindsFields').classList.toggle('hidden');
}

function toggleVitrase() {
    if(document.getElementById('model').value === 'spiral') return;
    vOn = !vOn;
    document.getElementById('btnVitrase').innerText = vOn ? "ON" : "OFF";
    document.getElementById('vContainer').classList.toggle('hidden', !vOn);
    updateVitraseUI();
}

function updateVitraseUI() {
    const isSpiral = document.getElementById('vModel').value === 'spiral';
    document.getElementById('vInputSpiral').classList.toggle('hidden', !(vOn && isSpiral));
}

function tambah() {
    let obj = { id: Date.now(), mode, nama: document.getElementById('nama').value || (mode === 'curtain' ? "Gorden" : "Blinds") };
    if(mode === 'curtain') {
        Object.assign(obj, { L: +document.getElementById('lebar').value, T: +document.getElementById('tinggi').value, hKain: +document.getElementById('hKain').value, hVit: +document.getElementById('hVitras').value, model: document.getElementById('model').value, jenis: document.getElementById('jenisKain').value, vOn, vModel: document.getElementById('vModel').value, vL: +document.getElementById('vL').value, vT: +document.getElementById('vT').value, vQ: +document.getElementById('vQ').value });
    } else {
        Object.assign(obj, { h: +document.getElementById('bHarga').value, L: +document.getElementById('bL').value, T: +document.getElementById('bT').value });
    }
    list.push(obj); render();
}

function hitung(w) {
    let items = [], Lc = Math.max(w.L, 1);
    if(w.mode === 'curtain') {
        let rumusDasarKain = (w.jenis === 'lokal') ? Math.ceil((w.L + 0.2) / 0.4) * (w.T + 0.3) : (w.L + 0.2) * 3;
        
        let mK = rumusDasarKain;
        if(w.model === 'tabtop') mK += 1.0;
        
        let hargaKain = (w.jenis === 'vitrase') ? w.hVit : w.hKain;
        items.push({nama: "Kain", qty: mK.toFixed(2)+"m", harga: mK * hargaKain}, {nama: "Jahit Kain", qty: mK.toFixed(2)+"m", harga: mK * h.jahit});
        
        if(w.model === 'smokring') {
            let n = Math.ceil(w.L * 24); if(n%2!==0) n++;
            items.push({nama: "Smokring", qty: n+"pcs", harga: n * h.smokring});
        }
        if(['smokring', 'tabtop', 'plisket'].includes(w.model)) {
            items.push({nama: (w.model === 'plisket' ? "Rell" : "Rollet"), qty: Lc+"m", harga: Lc * (w.model === 'plisket' ? h.rell : h.rollet)}, {nama: "Hook", qty: "1 set", harga: h.hook}, {nama: "Tali", qty: "1 set", harga: h.tali});
        } else if(w.model === 'spiral') { items.push({nama: "Stick", qty: "1pcs", harga: h.stick}); }
        
        if(w.vOn) {
            let mKvit = (w.vModel === 'spiral') ? (w.vL * w.vQ) : rumusDasarKain;
            items.push({nama: "Vitrase", qty: mKvit.toFixed(2)+"m", harga: mKvit * w.hVit}, {nama: "Jahit Vitrase", qty: mKvit.toFixed(2)+"m", harga: mKvit * h.jahit}, {nama: "Rell", qty: Lc+"m", harga: Lc * h.rell});
        }
        items.push({nama: "Instalasi", qty: Lc+"m", harga: Lc * h.instalasi});
    } else {
        let luas = Math.max(w.L, 1) * Math.max(w.T, 1);
        items.push({nama: "Blinds", qty: luas+"m²", harga: luas * w.h}, {nama: "Instalasi", qty: Lc+"m", harga: Lc * h.instalasi});
    }
    return { items, total: items.reduce((s, i) => s + i.harga, 0) };
}

function render() {
    let cont = document.getElementById('daftarJendela'), grand = 0;
    if(list.length === 0) {
        cont.innerHTML = '<p style="text-align:center; color:#777; font-size:14px;">Belum ada jendela ditambahkan.</p>';
        document.getElementById('totalSemua').innerText = "Total Semua: Rp 0";
        return;
    }

    cont.innerHTML = list.map(w => {
        let res = hitung(w); grand += res.total;
        let secureData = encodeURIComponent(JSON.stringify({ nama: w.nama, items: res.items, total: res.total }));

        return `<div class="window-card">
            <div class="card-header">
                <strong>${w.nama}</strong>
                <span style="color:var(--accent); font-weight:bold;">Rp ${res.total.toLocaleString()}</span>
            </div>
            <div class="card-actions">
                <button onclick="bukaModal('${secureData}')" style="background:#333; color:#fff; border:1px solid #555;">Detail</button>
                <button onclick="list=list.filter(x=>x.id!=${w.id});render()" style="background:var(--danger); color:#fff;">Hapus</button>
            </div>
        </div>`;
    }).join('');
    document.getElementById('totalSemua').innerText = "Total Semua: Rp " + grand.toLocaleString();
}

function bukaModal(encodedData) {
    const data = JSON.parse(decodeURIComponent(encodedData));
    document.getElementById('modalTitle').innerText = "Rincian: " + data.nama;
    
    let bodyHtml = '';
    data.items.forEach(item => {
        bodyHtml += `
            <div class="detail-row">
                <div>
                    <div style="font-weight: bold; font-size: 14px;">${item.nama}</div>
                    <div style="font-size: 0.8rem; color: #aaa;">Qty: ${item.qty}</div>
                </div>
                <div style="font-weight: bold; color: var(--accent); font-size: 14px;">
                    Rp ${Math.round(item.harga).toLocaleString()}
                </div>
            </div>
        `;
    });
    
    bodyHtml += `
        <div class="detail-row" style="border-top: 2px solid var(--accent); margin-top: 10px; padding-top: 12px; font-size: 1rem;">
            <strong>TOTAL AKHIR</strong>
            <strong style="color: #4af2a1;">Rp ${Math.round(data.total).toLocaleString()}</strong>
        </div>
    `;
    
    document.getElementById('modalBody').innerHTML = bodyHtml;
    document.getElementById('customModal').classList.add('active');
}

function tutupModal() {
    document.getElementById('customModal').classList.remove('active');
}

function tutupModalLuar(event) {
    if (event.target.id === 'customModal') {
        tutupModal();
    }
}

function lanjutKeInvoice() {
    const totalSemua = document.getElementById('totalSemua').innerText.replace('Total Semua: Rp ', '').replace(/,/g, '');
    localStorage.setItem('listJendela', JSON.stringify(list));
    localStorage.setItem('totalSemua', totalSemua);
    window.location.href = 'invoice.html';
}

render();
</script>

</body>
</html>
